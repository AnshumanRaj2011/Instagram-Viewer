<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Vault</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

textarea{
width:90%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
margin:10px;
}

button{
padding:10px 20px;
margin:5px;
border-radius:8px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
}

.note{
background:#1e293b;
padding:10px;
margin:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h2>🔐 My Encrypted Vault</h2>

<textarea id="secret" placeholder="Write your secret"></textarea>

<br>

<button onclick="unlock()">Unlock (Fingerprint)</button>
<button onclick="saveSecret()">Save</button>

<div id="notes"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// Firebase config
const firebaseConfig = {
apiKey: "AIzaSyCE7RsYIyLZB_JDkzZapB-XgYzixfFFh9E",
authDomain: "instagram-viewer-d1b90.firebaseapp.com",
databaseURL: "https://instagram-viewer-d1b90-default-rtdb.firebaseio.com",
projectId: "instagram-viewer-d1b90",
storageBucket: "instagram-viewer-d1b90.firebasestorage.app",
messagingSenderId: "558751573053",
appId: "1:558751573053:web:03ecc66967414f2a0db654",
measurementId: "G-F75CHB90YR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cryptoKey;

// biometric unlock
async function unlock(){

try{

await navigator.credentials.get({
publicKey:{
challenge:new Uint8Array(32),
timeout:60000,
userVerification:"required"
}
});

cryptoKey = await crypto.subtle.generateKey(
{name:"AES-GCM",length:256},
true,
["encrypt","decrypt"]
);

alert("Vault unlocked");

loadNotes();

}
catch(e){
alert("Fingerprint authentication failed");
}

}

// encrypt
async function encrypt(text){

const iv = crypto.getRandomValues(new Uint8Array(12));

const encoded = new TextEncoder().encode(text);

const cipher = await crypto.subtle.encrypt(
{name:"AES-GCM",iv},
cryptoKey,
encoded
);

return {
data:Array.from(new Uint8Array(cipher)),
iv:Array.from(iv)
};

}

// decrypt
async function decrypt(data,iv){

const decrypted = await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
cryptoKey,
new Uint8Array(data)
);

return new TextDecoder().decode(decrypted);

}

// save
async function saveSecret(){

if(!cryptoKey){
alert("Unlock vault first");
return;
}

const text=document.getElementById("secret").value;

const encrypted=await encrypt(text);

const id=Math.random().toString(36).substring(2);

db.ref("vault/"+id).set(encrypted);

document.getElementById("secret").value="";

loadNotes();

}

// load
function loadNotes(){

db.ref("vault").once("value",async snap=>{

const container=document.getElementById("notes");

container.innerHTML="";

snap.forEach(async item=>{

const val=item.val();

const text=await decrypt(val.data,val.iv);

const div=document.createElement("div");

div.className="note";

div.innerText=text;

container.appendChild(div);

});

});

}

</script>

</body>
</html>
