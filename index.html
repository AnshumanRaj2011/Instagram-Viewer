<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fingerprint Vault</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
}

textarea{
width:90%;
height:150px;
padding:10px;
margin-top:20px;
border-radius:10px;
border:none;
display:none;
}

.note{
background:#1e293b;
padding:10px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>🔐 Fingerprint Vault</h2>

<button onclick="unlockVault()">Unlock</button>
<button onclick="makeNew()">Make New</button>

<br>

<textarea id="editor"></textarea>

<br>

<button id="saveBtn" onclick="saveNote()" style="display:none">Save</button>

<div id="notes"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCE7RsYIyLZB_JDkzZapB-XgYzixfFFh9E",
authDomain: "instagram-viewer-d1b90.firebaseapp.com",
databaseURL: "https://instagram-viewer-d1b90-default-rtdb.firebaseio.com",
projectId: "instagram-viewer-d1b90",
storageBucket: "instagram-viewer-d1b90.firebasestorage.app",
messagingSenderId: "558751573053",
appId: "1:558751573053:web:03ecc66967414f2a0db654",
measurementId: "G-F75CHB90YR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cryptoKey;
let editID = null;

async function fingerprint(){

try{

await navigator.credentials.get({
publicKey:{
challenge:new Uint8Array(32),
timeout:60000,
userVerification:"required"
}
});

return true;

}catch{

alert("Fingerprint failed");
return false;

}

}

async function getKey(){

let stored = localStorage.getItem("vaultKey");

if(stored){

const raw = Uint8Array.from(atob(stored), c => c.charCodeAt(0));

return await crypto.subtle.importKey(
"raw",
raw,
{name:"AES-GCM"},
true,
["encrypt","decrypt"]
);

}

const key = await crypto.subtle.generateKey(
{name:"AES-GCM",length:256},
true,
["encrypt","decrypt"]
);

const exported = await crypto.subtle.exportKey("raw",key);

const b64 = btoa(String.fromCharCode(...new Uint8Array(exported)));

localStorage.setItem("vaultKey",b64);

return key;

}

async function encrypt(text){

const iv = crypto.getRandomValues(new Uint8Array(12));

const encoded = new TextEncoder().encode(text);

const cipher = await crypto.subtle.encrypt(
{name:"AES-GCM",iv},
cryptoKey,
encoded
);

return{
data:Array.from(new Uint8Array(cipher)),
iv:Array.from(iv)
};

}

async function decrypt(data,iv){

const decrypted = await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
cryptoKey,
new Uint8Array(data)
);

return new TextDecoder().decode(decrypted);

}

function makeNew(){

document.getElementById("editor").style.display="block";
document.getElementById("saveBtn").style.display="inline";

document.getElementById("editor").value="";

editID = null;

}

async function unlockVault(){

if(!await fingerprint()) return;

cryptoKey = await getKey();

loadNotes();

}

function loadNotes(){

db.ref("vault").once("value",async snap=>{

const container = document.getElementById("notes");

container.innerHTML="";

snap.forEach(async item=>{

const val = item.val();

const text = await decrypt(val.data,val.iv);

const div = document.createElement("div");

div.className="note";

div.innerText = text;

div.onclick=function(){

document.getElementById("editor").style.display="block";
document.getElementById("saveBtn").style.display="inline";

document.getElementById("editor").value=text;

editID=item.key;

};

container.appendChild(div);

});

});

}

async function saveNote(){

if(!await fingerprint()) return;

const text=document.getElementById("editor").value;

const encrypted=await encrypt(text);

if(editID){

db.ref("vault/"+editID).set(encrypted);

}else{

const id=Math.random().toString(36).substring(2);

db.ref("vault/"+id).set(encrypted);

}

document.getElementById("editor").value="";

loadNotes();

}

</script>

</body>
</html>
